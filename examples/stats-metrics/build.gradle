apply plugin: 'java'

repositories {
  jcenter()
}

dependencies {
  compile 'com.github.ben-manes.caffeine:caffeine:2.5.6'
  compile 'io.dropwizard.metrics:metrics-core:3.1.2'

  testCompile 'org.testng:testng:6.10'
  testCompile 'org.hamcrest:java-hamcrest:***REDACTED-IP***'
}

test {
  useTestNG()
}
